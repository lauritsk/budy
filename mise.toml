[tools]
cocogitto = "7.0.0"
gitleaks = "8.30.1"
uv = "0.11.7"

[hooks]
enter = { task = "setup" }

[tasks.setup]
description = "Sync project dependencies"
run = "uv sync --locked"

[tasks.format]
description = "Format project"
run = "uv format --preview-features format"

[tasks.lint]
description = "Lint project"
run = "uv format --preview-features format --check"

[tasks.typecheck]
description = "Type-check project"
run = "uvx ty check"

[tasks.test]
description = "Run test suite"
run = "uv run pytest"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.docs]
description = "Regenerate CLI docs"
run = "uv run typer budy utils docs --output README.md --name budy"

[tasks.secrets]
description = "Scan project for secrets"
run = "gitleaks dir ."

[tasks.audit]
description = "Audit project dependencies"
run = "uv audit --preview-features audit --locked"

[tasks.commits]
description = "Enforce conventional commits"
run = "cog check"

[tasks.check]
description = "Run project checks"
depends = ["format", "lint", "typecheck", "test", "build", "docs", "secrets", "audit", "commits"]
