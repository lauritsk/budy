[env]
HK_MISE = 1

[tools]
actionlint = "1.7.12"
cocogitto = "7.0.0"
cosign = "3.0.6"
goreleaser = "2.16.0"
hk = "1.47.0"
ruff = "0.15.16"
rumdl = "0.2.10"
shellcheck = "0.11.0"
shfmt = "3.13.1"
syft = "1.45.1"
tombi = "1.1.2"
ty = "0.0.46"
uv = "0.11.19"

[hooks]
postinstall = "hk install --mise"

[tasks.budy]
description = "Run budy"
run = "uv run budy"

[tasks.install]
description = "Install project dependencies"
run = "uv sync --locked --dev"

[tasks.fix]
description = "Run hk-managed fixers across the repository"
depends = ["install"]
run = "hk fix --all"

[tasks.lint]
description = "Run hk-managed checks across the repository"
depends = ["install"]
run = "hk check --all"

[tasks.test]
description = "Run test suite"
depends = ["install"]
run = "uv run pytest"

[tasks.build]
description = "Build project package"
run = "uv build"

[tasks.docs]
description = "Regenerate CLI docs"
depends = ["install"]
run = "uv run typer budy utils docs --output docs/cli.md --name budy"

[tasks."docs:check"]
description = "Check that CLI docs are up to date"
depends = ["install"]
run = "tmp=$(mktemp) && trap 'rm -f \"$tmp\"' EXIT && uv run typer budy utils docs --output \"$tmp\" --name budy && diff -u docs/cli.md \"$tmp\""

[tasks.check]
description = "Run project checks"
depends = ["lint", "test", "build", "docs:check"]

[tasks."release:bump"]
description = "Bump project version"
run = "cog bump --auto"

[tasks."release:publish"]
description = "Publish release"
run = "goreleaser release --clean"
